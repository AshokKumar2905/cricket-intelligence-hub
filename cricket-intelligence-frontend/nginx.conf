server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # CRITICAL: Redirect all 404s to index.html for React Router
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API requests to avoid CORS issues in production
    location /api/ {
        proxy_pass http://backend:5000/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}