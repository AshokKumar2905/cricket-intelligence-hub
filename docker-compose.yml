services:
  # DATA NODE: Persistent Intelligence Storage
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    # TACTICAL HEALTH CHECK: Ensures engine is responsive before uplink
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ENGINE NODE: Flask Intelligence Backend
  backend:
    build: ./cricket-intelligence-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_HOST=mongodb
    depends_on:
      mongodb:
        condition: service_healthy # Wait for Health Check to pass
    volumes:
      - ./cricket-intelligence-backend/uploads:/app/uploads

  # GATEWAY NODE: Vite Tactical Frontend
  frontend:
    build: ./cricket-intelligence-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-data: